<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TicketOracle &mdash; Upcoming Music Events</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0e0f13;
      --panel: #181a22;
      --border: #2a2d39;
      --fg: #e8e8ee;
      --muted: #a0a3b1;
      --accent: #f7b733;
      --accent2: #fc4a1a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--fg);
    }
    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 32px; border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 {
      margin: 0; font-size: 20px; letter-spacing: 0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    header a {
      color: var(--fg); text-decoration: none; padding: 8px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      background: #20232c; font-size: 14px;
    }
    header a:hover { border-color: var(--accent); }
    main { max-width: 1000px; margin: 0 auto; padding: 32px; }
    h2 { margin: 0 0 16px; font-weight: 600; }
    .search-bar {
      width: 100%; background: var(--panel); border: 1px solid var(--border);
      color: var(--fg); border-radius: 10px; padding: 11px 16px;
      font-size: 15px; font-family: inherit; outline: none; margin-bottom: 20px;
    }
    .search-bar:focus { border-color: var(--accent); }
    .search-bar::placeholder { color: var(--muted); }
    .grid {
      display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px;
    }
    .card .artist { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .card .meta { color: var(--muted); font-size: 13px; line-height: 1.6; }
    .card .price {
      margin-top: 12px; font-size: 20px; font-weight: 700; color: var(--accent);
    }
    .empty { color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>TicketOracle</h1>
    <a href="/reviews">Reviews</a>
    <a href="/chat">Ask the AI assistant &rarr;</a>
  </header>
  <main>
    <h2>Upcoming events</h2>
    <input class="search-bar" id="search" type="search" placeholder="Search by artist, city, or venue&hellip;" />
    <div id="events" class="grid"><div class="empty">Loading&hellip;</div></div>
  </main>

  <script>
    function renderEvents(data) {
      const root = document.getElementById("events");
      if (!Array.isArray(data) || data.length === 0) {
        root.innerHTML = '<div class="empty">No events found.</div>';
        return;
      }
      root.innerHTML = data.map(ev => `
        <div class="card">
          <div class="artist">${ev.artist}</div>
          <div class="meta">
            ${ev.city} &middot; ${ev.venue}<br/>
            ${ev.date}
          </div>
          <div class="price">&euro;${ev.price_eur}</div>
        </div>
      `).join("");
    }

    async function loadEvents(query = "") {
      const root = document.getElementById("events");
      try {
        const url = query ? `/api/search?q=${encodeURIComponent(query)}` : "/api/events";
        const r = await fetch(url);
        const data = await r.json();
        renderEvents(query ? data.results : data);
      } catch {
        root.innerHTML = '<div class="empty">Failed to load events.</div>';
      }
    }

    let debounceTimer;
    document.getElementById("search").addEventListener("input", e => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => loadEvents(e.target.value.trim()), 250);
    });

    loadEvents();
  </script>
</body>
</html>
